
services:
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fichajes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fichajes}
      POSTGRES_USER: ${POSTGRES_USER:-fichajes}
    ports:
      - "5433:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
